<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cashback App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Calculadora de Cashback 💰</h1>

    <label>Valor da compra:</label>
    <input type="number" id="valor"><br><br>

    <label>Desconto (ex: 0.2 = 20%):</label>
    <input type="number" id="desconto" step="0.01"><br><br>

    <label>Cliente VIP:</label>

    <label class="switch">
        <input type="checkbox" id="vip">
        <span class="slider"></span>
    </label>

    <br><br>

    <button onclick="calcular()">Calcular Cashback</button>

    <h2 id="resultado"></h2>

    <h2>Histórico</h2>
    <ul id="historico"></ul>
</div>

<script>
async function calcular() {
    const valor = parseFloat(document.getElementById("valor").value);
    const desconto = parseFloat(document.getElementById("desconto").value) || 0;
    const vip = document.getElementById("vip").checked;

    // validação obrigatória
    if (isNaN(valor)) {
        alert("Digite um valor válido!");
        return;
    }

    try {
        const response = await fetch(window.location.origin + "/cashback", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                valor: valor,
                desconto: desconto,
                vip: vip
            })
        });

        const data = await response.json();

        if (data.cashback !== undefined) {
    document.getElementById("resultado").innerText =
        `Você recebeu R$ ${data.cashback} de cashback 💰`;
        } else {
    document.getElementById("resultado").innerText =
        `Erro: ${data.error}`;
}

        carregarHistorico();

    } catch (error) {
        console.error(error);
        alert("Erro ao calcular cashback. Tente novamente.");
    }
}

async function carregarHistorico() {
    try {
        const response = await fetch(window.location.origin + "/historico");
        const data = await response.json();

        const lista = document.getElementById("historico");
        lista.innerHTML = "";

        data.forEach(item => {
            const li = document.createElement("li");
            li.innerText = `${item.tipo_cliente} - R$ ${item.valor} → Cashback: R$ ${item.cashback}`;
            lista.appendChild(li);
        });

    } catch (error) {
        console.error("Erro ao carregar histórico:", error);
    }
}

window.onload = carregarHistorico;
</script>

</body>
</html>
